<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <title>Happy Wedding Afif & Indah</title>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(to bottom, #2b0000, #5a0b0b, #220000);
      color: white;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      z-index: -1;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      transform: scale(1.05);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      animation: fadeIn 2s ease;
      background: rgba(255,255,255,0.08);
      padding: 45px;
      border-radius: 35px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .hero h3 {
      letter-spacing: 8px;
      margin-bottom: 15px;
      color: #ffd6d6;
    }

    .hero h1 {
      font-size: 70px;
      margin-bottom: 20px;
      line-height: 1.1;
      text-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .hero p {
      font-size: 20px;
      max-width: 700px;
      margin: auto;
      color: #ffe9e9;
      line-height: 1.8;
    }
